name: opencode-pr-review

on:
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (for manual trigger)"
        required: false
        default: ""

jobs:
  review:
    if: |
      (
        github.event.comment &&
        (
          contains(github.event.comment.body, ' /oc') ||
          startsWith(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, ' /opencode') ||
          startsWith(github.event.comment.body, '/opencode')
        )
      ) ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Review with opencode and post a comment
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          PR="${{ github.event.inputs.pr_number }}"
          [ -z "$PR" ] && PR="${{ github.event.pull_request.number }}"
          [ -z "$PR" ] && PR="${{ github.event.issue.number }}"
          if [ -z "$PR" ]; then echo "No PR number; skipping."; exit 0; fi
          DIFF="$(gh pr diff "$PR" --repo "${{ github.repository }}" 2>/dev/null | head -c 60000)"
          PROMPT="You are a senior code reviewer. Review this pull request diff concisely and constructively: flag bugs, logic errors, security issues, and missing tests, citing file/line where possible. If it looks good, say so briefly. Output only the review — no private reasoning.

          DIFF:
          $DIFF"
          opencode run --model minimax/MiniMax-M2.7 "$PROMPT" 2>/dev/null </dev/null \
            | sed '/<think>/,/<\/think>/d' > review.txt || true
          if [ ! -s review.txt ]; then echo "_opencode produced no review output._" > review.txt; fi
          { echo "## 🤖 opencode review (MiniMax-M2.7)"; echo; cat review.txt; } \
            | gh pr comment "$PR" --repo "${{ github.repository }}" --body-file -
