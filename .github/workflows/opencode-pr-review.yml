name: opencode-pr-review

# Thin caller — delegates to the org-canonical reusable workflow in ease-org/.github.
# The review implementation (model, agent, opencode/agents-sdk wiring) lives in ONE place:
# ease-org/.github/.github/workflows/opencode.yml. Bump the @v1 tag there to roll out changes.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (for manual trigger)"
        required: false
        default: ""

concurrency:
  group: opencode-pr-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Must grant >= the reusable workflow's declared job permissions, or the
# call fails at startup. opencode.yml needs pull-requests + issues write.
permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        (
          contains(github.event.comment.body, ' /oc') ||
          startsWith(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, ' /opencode') ||
          startsWith(github.event.comment.body, '/opencode')
        )
      )
    uses: ease-org/.github/.github/workflows/opencode.yml@v1
    with:
      model: minimax/MiniMax-M2.7
      agent: opencode-reviewer
    secrets:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
