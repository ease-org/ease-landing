name: Playwright E2E

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright (chromium, desktop + mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        # The Astro app and Playwright config live under web/.
        working-directory: web
    env:
      CI: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        # The Playwright config builds the site and serves it via
        # `astro preview` through its webServer block — no separate
        # build/serve step is needed here.
        run: npx playwright test

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14
